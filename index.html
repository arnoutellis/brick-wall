<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brick Wall Builder</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom,
        #5b9bd5 0%,
        #87CEEB 45%,
        #c8e8a0 45%,
        #8B7355 55%,
        #6b5230 100%
      );
      font-family: 'Georgia', serif;
      overflow: hidden;
    }

    h1 {
      font-size: 2rem;
      color: #fff;
      text-shadow: 1px 2px 6px rgba(0,0,0,0.4);
      margin-bottom: 2.5rem;
      letter-spacing: 3px;
    }

    #scene {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #wall-container {
      position: relative;
    }

    .brick {
      position: absolute;
      border-radius: 4px;
      background: linear-gradient(
        160deg,
        #d4631a 0%,
        #c04820 40%,
        #9e3515 75%,
        #b54022 100%
      );
      box-shadow:
        inset 0 2px 0 rgba(255, 200, 150, 0.35),
        inset 0 -2px 0 rgba(0, 0, 0, 0.3),
        inset 2px 0 0 rgba(255, 180, 120, 0.15),
        inset -2px 0 0 rgba(0, 0, 0, 0.2),
        3px 4px 8px rgba(0, 0, 0, 0.35);
      opacity: 0;
    }

    .brick::before {
      content: '';
      position: absolute;
      top: 38%;
      left: 6%;
      right: 6%;
      height: 1px;
      background: rgba(0, 0, 0, 0.15);
    }

    .brick::after {
      content: '';
      position: absolute;
      top: 18%;
      left: 10%;
      right: 25%;
      height: 1px;
      background: rgba(255, 255, 255, 0.12);
    }

    #ground {
      height: 20px;
      background: linear-gradient(to bottom, #7a5c1e, #5a3e0e);
      border-top: 3px solid #4a3008;
      border-radius: 0 0 6px 6px;
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.5);
    }

    #status {
      margin-top: 28px;
      font-size: 1.25rem;
      color: #fff;
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.5);
      height: 2rem;
      font-weight: bold;
      letter-spacing: 2px;
    }

    #brick-count {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.8);
      margin-top: 6px;
      height: 1.2rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="scene">
    <h1>🧱 BRICK WALL BUILDER</h1>
    <div id="wall-container"></div>
    <div id="ground"></div>
    <div id="status">Get ready...</div>
    <div id="brick-count"></div>
  </div>

  <script>
    const BRICK_W  = 110;
    const BRICK_H  = 44;
    const MORTAR   = 8;
    const ROWS     = 3;
    const COLS     = 4;
    const HALF     = (BRICK_W + MORTAR) / 2;

    const container = document.getElementById('wall-container');
    const ground    = document.getElementById('ground');
    const statusEl  = document.getElementById('status');
    const countEl   = document.getElementById('brick-count');

    const totalW = COLS * BRICK_W + (COLS - 1) * MORTAR + HALF;
    const totalH = ROWS * BRICK_H + (ROWS - 1) * MORTAR;

    container.style.width  = totalW + 'px';
    container.style.height = totalH + 'px';
    ground.style.width     = totalW + 'px';

    // row 0 = bottom, row ROWS-1 = top
    function getBricks() {
      const list = [];
      for (let row = 0; row < ROWS; row++) {
        const offset = row % 2 === 0 ? 0 : HALF;
        const y = (ROWS - 1 - row) * (BRICK_H + MORTAR);
        for (let col = 0; col < COLS; col++) {
          list.push({ x: offset + col * (BRICK_W + MORTAR), y, row, col });
        }
      }
      return list;
    }

    const brickDefs = getBricks();
    let brickEls = [];

    const sleep = ms => new Promise(r => setTimeout(r, ms));

    function createBrickEls() {
      container.innerHTML = '';
      brickEls = [];
      brickDefs.forEach(def => {
        const el = document.createElement('div');
        el.className = 'brick';
        el.style.cssText = `
          width:${BRICK_W}px;
          height:${BRICK_H}px;
          left:${def.x}px;
          top:${def.y}px;
          opacity:0;
          transform:translateY(-${totalH + 60}px) rotate(-5deg);
        `;
        container.appendChild(el);
        brickEls.push(el);
      });
    }

    async function buildWall() {
      statusEl.textContent = 'Building the wall...';
      createBrickEls();

      for (let i = 0; i < brickEls.length; i++) {
        countEl.textContent = `Brick ${i + 1} of ${brickEls.length}`;
        const el = brickEls[i];
        el.style.transition = 'transform 0.38s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.15s ease';
        el.style.opacity    = '1';
        el.style.transform  = 'translateY(0) rotate(0deg)';
        await sleep(230);
      }

      countEl.textContent = '';
      statusEl.textContent = '✅ Wall complete!';
      await sleep(2200);
    }

    async function demolishWall() {
      statusEl.textContent = '💥 Timber!';
      countEl.textContent  = '';

      const fallPromises = brickEls.map((el, i) => {
        const row   = brickDefs[i].row;
        const delay = (ROWS - 1 - row) * 70 + Math.random() * 130;
        const rot   = (Math.random() > 0.5 ? 1 : -1) * (25 + Math.random() * 65);
        const xDrift = (Math.random() - 0.5) * 140;
        const dur   = 0.5 + Math.random() * 0.45;

        return new Promise(resolve => {
          setTimeout(() => {
            el.style.transition = `transform ${dur}s cubic-bezier(0.55, 0, 1, 0.45), opacity ${dur * 0.75}s ease-in`;
            el.style.transform  = `translateY(${totalH + 300}px) translateX(${xDrift}px) rotate(${rot}deg)`;
            el.style.opacity    = '0';
            setTimeout(resolve, dur * 1000 + 250);
          }, delay);
        });
      });

      await Promise.all(fallPromises);
      await sleep(700);
      statusEl.textContent = 'Rebuilding...';
      await sleep(400);
    }

    async function run() {
      await sleep(600);
      while (true) {
        await buildWall();
        await demolishWall();
      }
    }

    run();
  </script>
</body>
</html>
